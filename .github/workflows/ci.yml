name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ api/ monitoring/ tests/ --ignore E501

      - name: Run unit tests (preprocessing)
        run: |
          pytest tests/test_preprocessing.py -v --tb=short

      - name: Run API tests (mocked model)
        run: |
          pytest tests/test_api.py -v --tb=short

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t credit-risk-api:${{ github.sha }} .
          docker build -t credit-risk-api:latest .

      - name: Smoke test the container
        run: |
          docker run -d --name api-test -p 8000:8000 credit-risk-api:latest
          sleep 10
          curl -f http://localhost:8000/health || (docker logs api-test && exit 1)
          docker stop api-test
