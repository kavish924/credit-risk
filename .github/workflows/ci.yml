name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  APP_PORT: "8001"

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.1.1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov ruff

      - name: Lint with ruff
        run: |
          ruff check src/ api/ monitoring/ tests/ --ignore E501

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  docker-build:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Build Docker image
        run: |
          docker build -t credit-risk-api:${{ github.sha }} .
          docker build -t credit-risk-api:latest .

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: credit-risk-api:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Smoke test the container
        run: |
          docker run -d --name api-test -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} credit-risk-api:latest
          sleep 15
          curl -f http://localhost:${{ env.APP_PORT }}/health || (docker logs api-test && exit 1)
          docker stop api-test
