name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_PORT: "8001"

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{secrets.DOCKER_USERNAME }}
          password: ${{secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.5.0
        with:
          context: .
          push: true
          tags: |
            ${{ kavish31}}/credit-risk-api:latest
            ${{ kavish31 }}/credit-risk-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security scan pushed image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ kavish31 }}/credit-risk-api:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Deploy via SSH
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ kavish31 }}/credit-risk-api:latest
            docker stop credit-risk-api || true
            docker rm credit-risk-api || true
            docker run -d \
              --name credit-risk-api \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              --env-file .env \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/credit-risk-api:latest
            echo "✅ Deployed successfully"
