name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/credit-risk-api:latest
            ${{ secrets.DOCKER_USERNAME }}/credit-risk-api:${{ github.sha }}

      - name: Deploy via SSH (optional)
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/credit-risk-api:latest
            docker stop credit-risk-api || true
            docker rm credit-risk-api || true
            docker run -d \
              --name credit-risk-api \
              -p 8000:8000 \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/credit-risk-api:latest
            echo "✅ Deployed successfully"
